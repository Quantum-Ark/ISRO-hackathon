    <line x1="256" y1="372" x2="256" y2="412"/>
    <line x1="140" y1="256" x2="100" y2="256"/>
    <line x1="372" y1="256" x2="412" y2="256"/>
    <line x1="174" y1="174" x2="146" y2="146"/>
    <line x1="338" y1="338" x2="366" y2="366"/>
    <line x1="174" y1="338" x2="146" y2="366"/>
    <line x1="338" y1="174" x2="366" y2="146"/>
  </g>
  <!-- Flare highlight -->
  <path d="M236,200 Q256,180 276,200 Q280,240 256,270 Q232,240 236,200Z" fill="#ffffff" opacity="0.25"/>

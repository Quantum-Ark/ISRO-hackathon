<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" fill="none">
  <style>
    text { font-family: 'JetBrains Mono', monospace; }
    .label { fill: #566176; font-size: 10px; }
    .heading { fill: #D4DCE6; font-size: 11px; font-weight: bold; }
    .value { fill: #8895A8; font-size: 10px; }
    .accent { fill: #E67E22; }
  </style>
  
  <!-- Background -->
  <rect width="1000" height="520" fill="#0A0E14" rx="0"/>
  <rect x="1" y="1" width="998" height="518" fill="none" stroke="#1E2632" stroke-width="1"/>
  
  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" class="heading" fill="#E67E22" font-size="13">HELIOS-CORTEX — SYSTEM ARCHITECTURE</text>
  <line x1="200" y1="35" x2="800" y2="35" stroke="#1E2632" stroke-width="1"/>

  <!-- Data Sources -->
  <rect x="40" y="55" width="160" height="80" fill="#11161D" stroke="#28303D" stroke-width="1"/>
  <text x="120" y="72" text-anchor="middle" class="heading">DATA INGESTION</text>
  <text x="50" y="88" class="value">• PRADAN (Aditya-L1 FITS)</text>
  <text x="50" y="102" class="value">• GOES XRS (1-8A / 0.5-4A)</text>
  <text x="50" y="116" class="value">• Real-time SWPC endpoint</text>

  <!-- Arrow: Data → Feature -->
  <line x1="200" y1="95" x2="250" y2="95" stroke="#28303D" stroke-width="1" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#28303D"/>
    </marker>
    <marker id="arrow-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#E67E22"/>
    </marker>
  </defs>

  <!-- Feature Engineering -->
  <rect x="260" y="55" width="180" height="80" fill="#11161D" stroke="#28303D" stroke-width="1"/>
  <text x="350" y="72" text-anchor="middle" class="heading">FEATURE ENGINEERING</text>
  <text x="270" y="88" class="value">• Hardness Ratio (HR)</text>
  <text x="270" y="102" class="value">• Temporal derivatives (1st, 2nd)</text>
  <text x="270" y="116" class="value">• Rolling Z-score / MAD</text>

  <!-- Arrow: Feature → Split -->
  <line x1="440" y1="95" x2="490" y2="95" stroke="#28303D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Split into two paths -->
  <line x1="490" y1="55" x2="490" y2="215" stroke="#28303D" stroke-width="1"/>
  <line x1="490" y1="95" x2="490" y2="215" stroke="#28303D" stroke-width="1"/>
  <line x1="490" y1="215" x2="540" y2="215" stroke="#28303D" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="490" y1="95" x2="540" y2="95" stroke="#28303D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Nowcasting Engine -->
  <rect x="550" y="55" width="200" height="80" fill="#11161D" stroke="#F1C40F" stroke-width="1"/>
  <rect x="550" y="55" width="200" height="20" fill="rgba(241,196,15,0.1)"/>
  <text x="650" y="69" text-anchor="middle" fill="#F1C40F" font-size="10" font-weight="bold">STAGE 1: NOWCASTING</text>
  <text x="560" y="86" class="value">• MAD Adaptive Thresholding</text>
  <text x="560" y="100" class="value">• 30-min rolling window</text>
  <text x="560" y="114" class="value">• 3σ alert trigger</text>

  <!-- Forecasting Engine -->
  <rect x="550" y="175" width="200" height="80" fill="#11161D" stroke="#E67E22" stroke-width="1"/>
  <rect x="550" y="175" width="200" height="20" fill="rgba(230,126,34,0.1)"/>
  <text x="650" y="189" text-anchor="middle" fill="#E67E22" font-size="10" font-weight="bold">STAGE 2: FORECASTING</text>
  <text x="560" y="206" class="value">• TCN (8-layer dilated conv)</text>
  <text x="560" y="220" class="value">• 30-min input window</text>
  <text x="560" y="234" class="value">• Confidence score 0.0–1.0</text>

  <!-- Arrows from both to Alert Tree -->
  <line x1="750" y1="95" x2="810" y2="95" stroke="#F1C40F" stroke-width="1"/>
  <line x1="750" y1="175" x2="810" y2="175" stroke="#E67E22" stroke-width="1"/>
  <line x1="810" y1="95" x2="810" y2="175" stroke="#28303D" stroke-width="1"/>
  <line x1="810" y1="135" x2="850" y2="135" stroke="#E67E22" stroke-width="1" marker-end="url(#arrow-o)"/>

  <!-- Alert Tree -->
  <rect x="860" y="100" width="110" height="70" fill="#11161D" stroke="#E67E22" stroke-width="1"/>
  <text x="915" y="115" text-anchor="middle" class="heading" fill="#E67E22" font-size="9">3-TIER ALERT</text>
  <text x="870" y="130" fill="#2ECC71" font-size="10">■ GREEN — Stable</text>
  <text x="870" y="144" fill="#F1C40F" font-size="10">■ YELLOW — Warning</text>
  <text x="870" y="158" fill="#E74C3C" font-size="10">■ RED — Critical</text>

  <!-- Transfer Learning Box -->
  <rect x="260" y="175" width="180" height="60" fill="#11161D" stroke="#28303D" stroke-width="1"/>
  <rect x="260" y="175" width="180" height="18" fill="rgba(52,152,219,0.1)"/>
  <text x="350" y="188" text-anchor="middle" fill="#3498DB" font-size="9" font-weight="bold">TRANSFER LEARNING</text>
  <text x="270" y="204" class="value">GOES XRS (1996-2024) → Aditya-L1</text>
  <text x="270" y="218" class="value">Fine-tune: 142 samples · MMD alignment</text>
  <line x1="350" y1="235" x2="350" y2="175" stroke="#3498DB" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- Dashboard Preview Box -->
  <rect x="40" y="175" width="200" height="100" fill="#11161D" stroke="#28303D" stroke-width="1"/>
  <rect x="40" y="175" width="200" height="18" fill="rgba(46,204,113,0.1)"/>
  <text x="140" y="188" text-anchor="middle" fill="#2ECC71" font-size="9" font-weight="bold">MISSION CONTROL DASHBOARD</text>
  <text x="50" y="206" class="value">• Dual-Y flux chart (SoLEXS+HEL1OS)</text>
  <text x="50" y="220" class="value">• Hardness ratio real-time plot</text>
  <text x="50" y="234" class="value">• Alert log with 3-tier tree</text>
  <text x="50" y="248" class="value">• Replay simulator (PRADAN/GOES)</text>
  <text x="50" y="262" class="value">• Metrics: POD, FAR, CSI, Lead Time</text>
  <line x1="140" y1="275" x2="140" y2="160" stroke="#2ECC71" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- Bottom: Pipeline Box -->
  <rect x="40" y="300" width="930" height="55" fill="#11161D" stroke="#28303D" stroke-width="1"/>
  <rect x="40" y="300" width="930" height="18" fill="rgba(136,149,168,0.05)"/>
  <text x="505" y="313" text-anchor="middle" class="heading">END-TO-END PIPELINE</text>
  
  <text x="70" y="332" class="value">1. Fetch (NOAA/PRADAN)</text>
  <line x1="210" y1="330" x2="250" y2="330" stroke="#28303D" stroke-width="1"/>
  <text x="260" y="332" class="value">2. Align &amp; Resample</text>
  <line x1="400" y1="330" x2="440" y2="330" stroke="#28303D" stroke-width="1"/>
  <text x="450" y="332" class="value">3. Feature Extract</text>
  <line x1="580" y1="330" x2="620" y2="330" stroke="#28303D" stroke-width="1"/>
  <text x="630" y="332" class="value">4. Model Inference</text>
  <line x1="760" y1="330" x2="800" y2="330" stroke="#28303D" stroke-width="1"/>
  <text x="810" y="332" class="value">5. Alert Broadcast</text>

  <!-- Metrics row -->
  <rect x="40" y="375" width="930" height="50" fill="#11161D" stroke="#28303D" stroke-width="1"/>
  <rect x="40" y="375" width="930" height="18" fill="rgba(46,204,113,0.05)"/>
  <text x="505" y="388" text-anchor="middle" class="heading">VALIDATION METRICS (M-Class+)</text>
  
  <text x="100" y="409" fill="#2ECC71" font-size="14" font-weight="bold" font-family="'JetBrains Mono', monospace">POD: 0.94</text>
  <line x1="200" y1="403" x2="220" y2="403" stroke="#28303D" stroke-width="1"/>
  <text x="310" y="409" fill="#F1C40F" font-size="14" font-weight="bold" font-family="'JetBrains Mono', monospace">FAR: 0.21</text>
  <line x1="430" y1="403" x2="450" y2="403" stroke="#28303D" stroke-width="1"/>
  <text x="540" y="409" fill="#3498DB" font-size="14" font-weight="bold" font-family="'JetBrains Mono', monospace">CSI: 0.78</text>
  <line x1="650" y1="403" x2="670" y2="403" stroke="#28303D" stroke-width="1"/>
  <text x="760" y="409" fill="#E67E22" font-size="14" font-weight="bold" font-family="'JetBrains Mono', monospace">Lead: +28 min</text>

  <!-- Bottom footer -->
  <line x1="40" y1="445" x2="970" y2="445" stroke="#1E2632" stroke-width="1"/>
  <text x="500" y="465" text-anchor="middle" fill="#566176" font-size="9">Built for ISRO Spectrum Hackathon · Aditya-L1 SoLEXS + HEL1OS Fusion</text>
  
  <!-- GitHub corner -->
  <text x="850" y="465" fill="#566176" font-size="9" font-family="'JetBrains Mono', monospace">github.com/Quantum-Ark/ISRO-hackathon</text>
  <text x="40" y="500" fill="#566176" font-size="8">React 18 · Vite · FastAPI · Python 3.10+ · Tailwind CSS · SVG Custom Charts</text>
</svg>
